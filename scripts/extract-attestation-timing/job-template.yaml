---
# kubectl job template for extracting attestation timing data.
# One job per date range, deploy 4 jobs (one per genpop node) to parallelize.
#
# Usage:
#   # Build and push image first
#   docker build -t ethpandaops/fcr-attestation-extract:latest scripts/extract-attestation-timing/
#   docker push ethpandaops/fcr-attestation-extract:latest
#
#   # Deploy jobs (edit START_DATE/END_DATE for each)
#   kubectl apply -f job-worker-0.yaml -n panda --context platform-analytics-hel1-staging
#
# Output goes to a PVC. After all jobs complete, copy the output locally:
#   kubectl cp panda/<pod>:/output ./attestation-timing/ --context platform-analytics-hel1-staging
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fcr-attestation-timing
  namespace: panda
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  storageClassName: rook-cephfs
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fcr-extract-worker-WORKER_ID
  namespace: panda
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 172800  # 48 hours
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        node.kubernetes.io/pool: dedicated-genpop
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: fcr-attestation-timing
      containers:
        - name: extract
          image: ethpandaops/fcr-attestation-extract:latest
          args:
            - "--start-date"
            - "START_DATE"
            - "--end-date"
            - "END_DATE"
            - "--output-dir"
            - "/output/mainnet/v1"
          volumeMounts:
            - name: output
              mountPath: /output
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
